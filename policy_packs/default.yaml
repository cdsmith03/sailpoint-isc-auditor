# sailpoint-isc-auditor default policy pack
#
# Copy this file and customise for your tenant:
#   isc-audit run --all --policy-pack ./policy_packs/myorg.yaml
#
# FORMAT: Both flat and nested thresholds: formats are supported.
# This file uses the nested format — group thresholds together for readability.
# Either format loads correctly; top-level keys take precedence if both exist.

# ── Inactivity & lifecycle thresholds ─────────────────────────────────────────
thresholds:
  stale_account_days: 90          # IH-02: accounts inactive longer than this
  inactivity_days: 60             # MI-03: machine identities dormant longer than this
  non_employee_grace_days: 7      # LI-05: days past end date before flagging
  mover_grace_days: 30            # LI-03: days after role change before stale access flagged
  peer_group_outlier_pct: 95.0    # AR-03: percentile threshold for outlier detection
  certification_overdue_days: 7   # GQ-01: days past due date before campaign is flagged
  source_stale_days: 3            # CR-02: days since last aggregation before flagging

# ── Privileged apps ───────────────────────────────────────────────────────────
# Findings involving these apps score higher impact.
privileged_apps:
  - "AWS"
  - "Azure"
  - "GCP"
  - "Workday"
  - "SAP"
  - "Snowflake"
  - "GitHub Enterprise"
  - "Okta"
  - "Active Directory"
  - "ServiceNow"

# ── Sensitive entitlements ────────────────────────────────────────────────────
# AR-06 fires when these are held by a broad population.
sensitive_entitlements:
  - "Payroll Admin"
  - "GL Posting"
  - "IAM Admin"
  - "Production Deploy"
  - "HR Admin"
  - "Finance Admin"
  - "Root Access"
  - "Domain Admin"
  - "Global Admin"
  - "Security Admin"

# ── Critical sources ──────────────────────────────────────────────────────────
# CR-07 fires when these have low policy attachment.
critical_sources:
  - "Workday"
  - "Active Directory"
  - "AWS"
  - "Azure AD"

# ── Naming conventions ────────────────────────────────────────────────────────
# MI-06 fires when service accounts don't match these patterns.
naming_conventions:
  service_accounts: "^svc[-_]"
  break_glass: "^(bg|emergency|breakglass)[-_]"
  shared_accounts: "^(shared|generic|admin)[-_]"

# ── Per-detector overrides ────────────────────────────────────────────────────
# Uncomment and customise to disable detectors or override thresholds.
# detector_overrides:
#   MI-06:
#     enabled: false           # disable this detector entirely
#   IH-02:
#     stale_account_days: 60  # override threshold for this detector only
